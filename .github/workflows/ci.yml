name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - spring-boot-version: '3.5.16'
          - spring-boot-version: '4.1.0'

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Build with Gradle (Spring Boot ${{ matrix.spring-boot-version }})
        run: ./gradlew --no-daemon clean build -PspringBootVersion=${{ matrix.spring-boot-version }}
